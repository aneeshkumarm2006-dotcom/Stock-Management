            background-color: #0a0e18;

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[440px] bg-surface-container border border-outline-variant p-8 rounded-lg shadow-2xl">
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary-fixed text-4xl" data-icon="account_balance_wallet">account_balance_wallet</span>
<h1 class="text-3xl font-headline font-bold text-primary tracking-tight">PortfolioPro</h1>
</div>
<p class="text-on-surface-variant font-body text-sm">Institutional-grade portfolio management</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface" for="full_name">Full Name</label>
<input class="w-full bg-surface-dim border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none placeholder:text-outline" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface" for="email">Email</label>
<input class="w-full bg-surface-dim border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none placeholder:text-outline" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface" for="password">Password</label>
<input class="w-full bg-surface-dim border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<p class="text-xs text-on-surface-variant mt-1.5 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        Minimum 8 characters
                    </p>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-3.5 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Create account
                </button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container px-4 text-on-surface-variant font-medium tracking-widest">OR</span>
</div>
</div>
<button class="w-full bg-surface-variant border border-outline-variant text-on-surface font-medium py-3.5 rounded-lg hover:bg-surface-bright active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="button">
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

</svg>
                Continue with Google
            </button>
<p class="mt-8 text-center text-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-semibold hover:underline transition-all" href="/login">Log in</a>
</p>
