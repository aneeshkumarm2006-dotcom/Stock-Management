<body class="bg-background text-on-background min-h-screen flex flex-col justify-center px-6 py-12">
<!-- Top: App Logo -->
<header class="mb-10 text-center">
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<h1 class="text-2xl font-headline font-bold tracking-tight text-primary">PortfolioPro</h1>
</div>
</header>
<!-- Content: Form Stack -->
<main class="w-full max-w-sm mx-auto space-y-6">
<!-- Inline Error State -->
<div class="bg-error-container/20 border border-error/30 rounded-lg p-3 flex items-center gap-3">
<span class="material-symbols-outlined text-error text-xl">error</span>
<p class="text-on-error-container text-sm font-medium">Invalid email or password</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant" for="email">Email</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-4 rounded-lg shadow-lg active:scale-[0.98] transition-transform" type="submit">
                Sign in
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-on-surface-variant text-xs font-bold tracking-widest">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary Action -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-high border border-outline-variant text-on-surface font-medium py-3.5 rounded-lg active:bg-surface-variant transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continue with Google
        </button>
</main>
<!-- Footer: Sign Up Link -->
<footer class="mt-auto pt-8 text-center pb-8">
<p class="text-sm text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-semibold hover:underline" href="#">Sign up</a>
</p>
</footer>
