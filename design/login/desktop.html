<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | PortfolioPro</title>

                        "primary-fixed-dim": "#317bef",
                        "on-tertiary-fixed": "#003f26",

<style>
        body {
            background-color: #0a0e18;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Auth Shell Background Decor -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-tertiary opacity-[0.03] blur-[120px] rounded-full"></div>
</div>
<main class="relative z-10 w-full max-w-[440px]">
<!-- Login Card -->
<div class="bg-surface-container border border-outline-variant/30 rounded-xl p-8 md:p-10 shadow-2xl">
<!-- Branding Header -->
<header class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<h1 class="font-headline font-bold text-2xl tracking-tight text-on-surface">PortfolioPro</h1>
</div>
<p class="text-on-surface-variant text-sm font-label">Terminal Access</p>
</header>
<!-- Error State -->
<div class="mb-6 flex items-center gap-2 px-4 py-3 bg-error-container/20 border border-error-container/40 rounded-lg">
<span class="material-symbols-outlined text-error text-[20px]">error</span>
<p class="text-error text-sm font-medium">Invalid email or password</p>
</div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface rounded-lg transition-all outline-none placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface rounded-lg transition-all outline-none placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<button class="w-full py-3.5 bg-primary-container text-on-primary-container font-bold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-xl">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="mx-4 text-xs font-medium text-on-surface-variant/60 uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Provider -->
<button class="w-full py-3 px-4 border border-outline-variant hover:bg-surface-variant text-on-surface font-medium rounded-lg transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<!-- Card Footer -->
<footer class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:underline underline-offset-4 ml-1 transition-all" href="/signup">Sign up</a>
</p>
</footer>
</div>
<!-- Extra Info Footer -->
<div class="mt-8 flex justify-center gap-6">
<a class="text-xs text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-xs text-on-surface-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<a class="text-xs text-on-surface-variant hover:text-on-surface transition-colors" href="#">Status</a>
</div>
</main>
<!-- Background Image with prompt as required -->
<div class="fixed inset-0 -z-10 opacity-20 overflow-hidden">
<img alt="Financial Dashboard" class="w-full h-full object-cover grayscale" data-alt="A sophisticated digital financial terminal background showing abstract bokeh lights reflecting off a dark glass screen. The scene is dominated by deep navy and charcoal tones with subtle flickers of cyan and emerald highlights reminiscent of stock market tickers. The lighting is low-key and professional, creating an atmosphere of high-stakes trading and secure data management. The aesthetic is clean and modern, following a dark-mode fintech design language." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCc0c2jMQXdEP0N9wOZNVIMW36o-1jKaSlWWHM-i7OlJxuvjtJcXdRExbJ1zg5Y-FOcYqWXgOuZWoKGT5ej3xrcgvLDlDz5i--kGlwXLGN02tRS0ivZoIJCrrkrhOMnbg3Bsh-AbzfFlp_4mzXGiAG2lAtuGA9m89ftHKSVghnPPVTPCTUrMBaeuf3v-6dz98jiw7oDosvi_rdgN7Wbh26K11d7R1YVa-_adFiiMokb5iJ2xuQYKpDf5HC2g4pw_QQmLzp_Y3Fui6sc"/>
</div>
</body></html>
